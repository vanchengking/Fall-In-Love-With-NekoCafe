name: ci

on:
  push:
  pull_request:

jobs:
  # 正式后端：Spring Boot 3（JDK 21 + Maven），mvn package 会运行 JUnit 单元测试
  backend-springboot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -f backend/neko-server/pom.xml clean package

  # 原型后端（Express）：保留语法检查与冒烟测试，作为参考实现
  prototype-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix backend install
      - run: npm --prefix backend run check
      - run: npm --prefix backend test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix frontend install
      - run: npm --prefix frontend build

  # Docker 构建检查：确保正式后端镜像可成功构建（构建过程含 mvn package 测试）
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t neko-server:ci ./backend/neko-server
