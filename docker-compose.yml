version: "3.9"

services:
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://neko:neko@postgres:5432/neko_cafe
      REDIS_URL: redis://redis:6379
      AUTO_SEED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neko_cafe
      POSTGRES_USER: neko
      POSTGRES_PASSWORD: neko
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neko -d neko_cafe"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
