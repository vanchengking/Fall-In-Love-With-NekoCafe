services:
  # 正式后端：Spring Boot 3（D-01 技术路线）。Express 原型保留在 ./backend 下作为参考，不再作为启动路径。
  backend:
    build: ./backend/neko-server
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/neko_cafe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true"
      SPRING_DATASOURCE_USERNAME: neko
      SPRING_DATASOURCE_PASSWORD: neko
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      NEKO_JWT_SECRET: "${NEKO_JWT_SECRET:-neko-cafe-dev-secret-please-change-in-prod-0123456789abcdef}"
      NEKO_SMS_FIXED_CODE: "${NEKO_SMS_FIXED_CODE:-8888}"
      NEKO_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: neko_cafe
      MYSQL_USER: neko
      MYSQL_PASSWORD: neko
      MYSQL_ROOT_PASSWORD: neko_root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uneko -pneko --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  uploads-data:
