version: "3.9"

services:
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: mysql://neko:neko@mysql:3306/neko_cafe
      REDIS_URL: redis://redis:6379
      AUTO_SEED: "true"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: neko_cafe
      MYSQL_USER: neko
      MYSQL_PASSWORD: neko
      MYSQL_ROOT_PASSWORD: neko_root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uneko -pneko --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql-data:
